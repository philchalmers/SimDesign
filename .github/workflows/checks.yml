name: R-CMD-CHECK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  R-CMD-CHECK:
    runs-on: ubuntu-latest

    container:
      image: ghcr.io/philchalmers/container-simdesign:latest

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: R CMD CHECK
        run: |
          R CMD build --no-manual --no-build-vignettes --ignore-vignettes ../SimDesign && \
          R CMD check --no-manual --no-vignettes --ignore-vignettes --as-cran --no-stop-on-test-error SimDesign_*
